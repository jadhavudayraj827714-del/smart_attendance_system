<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Attendance System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root { color-scheme: light; }
    body { background:
      radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 28%),
      radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 24%),
      linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
    }
    .glass { backdrop-filter: blur(12px); background: rgba(255,255,255,0.72); }
    .btn { transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(15,23,42,.12); }
    .btn:active { transform: translateY(0); }
    .day-col { min-width: 70px; }
    .sticky-head { position: sticky; top: 0; z-index: 30; }
    .sticky-left { position: sticky; left: 0; z-index: 20; }
    .sticky-left-2 { position: sticky; left: 120px; z-index: 20; }
    .sticky-left-3 { position: sticky; left: 220px; z-index: 20; }
    .sticky-left-4 { position: sticky; left: 320px; z-index: 20; }
    .sheet-wrap { overflow: auto; max-height: 56vh; border-radius: 1.5rem; }
    .soft-shadow { box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div id="app" class="min-h-screen"></div>

  <script>
    const DAYS_IN_MONTH = 30;
    const yearOptions = ["FY", "SY", "TY"];
    const deptOptions = ["CO", "IF", "EJ", "EE", "ME", "CE"];
    const divisions = {
      FY: {
        CO: ["CO-A", "CO-B"],
        ME: ["ME-A", "ME-B"],
        IF: ["IF"],
        EJ: ["EJ"],
        EE: ["EE"],
        CE: ["CE"]
      },
      SY: {
        CO: ["CO"],
        ME: ["ME-A", "ME-B"],
        IF: ["IF"],
        EJ: ["EJ"],
        EE: ["EE"],
        CE: ["CE"]
      },
      TY: {
        CO: ["CO"],
        ME: ["ME-A", "ME-B"],
        IF: ["IF"],
        EJ: ["EJ"],
        EE: ["EE"],
        CE: ["CE"]
      }
    };

    const state = {
      loggedIn: false,
      loginMethod: null,
      filters: { year: "", dept: "", division: "" },
      monthLabel: new Date().toLocaleString(undefined, { month: "long", year: "numeric" }),
      students: [],
      nextId: 1,
      editingStudent: null,
      currentStudentName: "",
      currentRollNo: ""
    };

    const STORAGE_KEY = "collegeAttendanceSystemV1";

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        loggedIn: state.loggedIn,
        loginMethod: state.loginMethod,
        filters: state.filters,
        monthLabel: state.monthLabel,
        students: state.students,
        nextId: state.nextId
      }));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        Object.assign(state, parsed);
        state.editingStudent = null;
        state.currentStudentName = "";
        state.currentRollNo = "";
      } catch (_) {}
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"]/g, s => ({"&":"&amp;","<":"&lt;","&gt;":"&gt;", '"':"&quot;"}[s]));
    }

    function currentDivisionOptions() {
      if (!state.filters.year || !state.filters.dept) return [];
      return (divisions[state.filters.year] && divisions[state.filters.year][state.filters.dept]) || [state.filters.dept];
    }

    function ensureDivisionValid() {
      const opts = currentDivisionOptions();
      if (!opts.includes(state.filters.division)) state.filters.division = opts[0] || "";
    }

    function attendanceCellValue(student, dayIndex) {
      const status = student.attendance[dayIndex];
      if (!status) return "";
      if (status === "absent") return ".";
      let count = 0;
      for (let i = 0; i <= dayIndex; i++) if (student.attendance[i] === "present") count++;
      return String(count);
    }

    function studentDisplayLabel(student) {
      return `${student.name} (${student.rollNo})`;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = state.loggedIn ? dashboardView() : loginView();
      bindEvents();
    }

    function loginView() {
      return `
      <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-5xl grid lg:grid-cols-2 gap-6 items-stretch">
          <div class="glass soft-shadow rounded-[2rem] p-8 lg:p-10 border border-white/60">
            <div class="inline-flex items-center gap-2 rounded-full bg-blue-50 text-blue-700 px-4 py-2 text-sm font-semibold">
              <span class="h-2.5 w-2.5 rounded-full bg-blue-600"></span>
              College Attendance Platform
            </div>
            <h1 class="mt-6 text-4xl lg:text-5xl font-black tracking-tight text-slate-900 leading-tight">
              Clean attendance workflow for every class.
            </h1>
            <p class="mt-4 text-slate-600 text-base lg:text-lg leading-7">
              Select year, department, division, add students quickly, mark present/absent, and export a monthly Excel sheet in one click.
            </p>
            <div class="mt-8 grid sm:grid-cols-3 gap-4 text-sm">
              <div class="rounded-2xl bg-white p-4 border border-slate-200">
                <div class="font-bold text-slate-900">Year-wise flow</div>
                <div class="text-slate-600 mt-1">FY / SY / TY</div>
              </div>
              <div class="rounded-2xl bg-white p-4 border border-slate-200">
                <div class="font-bold text-slate-900">Fast entry</div>
                <div class="text-slate-600 mt-1">Enter name → roll no → add</div>
              </div>
              <div class="rounded-2xl bg-white p-4 border border-slate-200">
                <div class="font-bold text-slate-900">Excel export</div>
                <div class="text-slate-600 mt-1">30-day monthly sheet</div>
              </div>
            </div>
          </div>
          <div class="glass soft-shadow rounded-[2rem] p-6 lg:p-8 border border-white/60">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h2 class="text-2xl font-extrabold text-slate-900">Login</h2>
                <p class="text-slate-500 mt-1">Use any sign-in button for demo access.</p>
              </div>
              <div class="h-14 w-14 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600"></div>
            </div>
            <div class="space-y-4">
              <button data-login="google" class="btn w-full rounded-2xl bg-white border border-slate-200 py-4 font-semibold flex items-center justify-center gap-3 hover:bg-slate-50">
                <span class="text-lg">G</span> Continue with Google
              </button>
              <button data-login="apple" class="btn w-full rounded-2xl bg-slate-900 text-white py-4 font-semibold flex items-center justify-center gap-3 hover:bg-slate-800">
                <span class="text-lg"></span> Continue with Apple
              </button>
              <div class="rounded-2xl bg-blue-50 border border-blue-100 p-4 text-sm text-blue-900 leading-6">
                Real Google/Apple login needs API keys and backend setup. This single-file version is a complete demo UI ready for college presentation.
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    function dashboardView() {
      const divOptions = currentDivisionOptions();
      const selectedLabel = [state.filters.year, state.filters.dept, state.filters.division].filter(Boolean).join(" / ") || "Not selected";
      return `
      <div class="p-4 lg:p-6">
        <div class="max-w-[1800px] mx-auto space-y-6">
          <div class="glass soft-shadow rounded-[2rem] p-5 lg:p-6 border border-white/60 flex flex-col xl:flex-row xl:items-center xl:justify-between gap-4">
            <div>
              <div class="text-sm font-semibold text-blue-700">Online Attendance System</div>
              <h1 class="text-3xl font-black text-slate-900 mt-1">Attendance Dashboard</h1>
              <p class="text-slate-500 mt-1">Logged in with ${escapeHTML(state.loginMethod || "demo")} • ${escapeHTML(selectedLabel)}</p>
            </div>
            <div class="flex flex-wrap gap-3">
              <button id="btnResetMonth" class="btn rounded-2xl bg-white border border-slate-200 px-4 py-3 font-semibold">New Month</button>
              <button id="btnLogout" class="btn rounded-2xl bg-slate-900 text-white px-4 py-3 font-semibold">Logout</button>
            </div>
          </div>

          <div class="grid lg:grid-cols-4 gap-4">
            <div class="glass rounded-[1.75rem] p-5 border border-white/60">
              <div class="text-sm text-slate-500">Total Students</div>
              <div class="text-3xl font-black text-slate-900 mt-2">${state.students.length}</div>
            </div>
            <div class="glass rounded-[1.75rem] p-5 border border-white/60">
              <div class="text-sm text-slate-500">Year / Dept / Division</div>
              <div class="text-xl font-bold text-slate-900 mt-2">${escapeHTML(selectedLabel)}</div>
            </div>
            <div class="glass rounded-[1.75rem] p-5 border border-white/60">
              <div class="text-sm text-slate-500">Month</div>
              <div class="text-2xl font-black text-slate-900 mt-2">${escapeHTML(state.monthLabel)}</div>
            </div>
            <div class="glass rounded-[1.75rem] p-5 border border-white/60">
              <div class="text-sm text-slate-500">Export</div>
              <div class="text-2xl font-black text-slate-900 mt-2">Excel .xlsx</div>
            </div>
          </div>

          <div class="glass soft-shadow rounded-[2rem] p-5 lg:p-6 border border-white/60">
            <h2 class="text-xl font-extrabold text-slate-900">Class Setup</h2>
            <div class="grid md:grid-cols-3 gap-4 mt-4">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Select Year</label>
                <select id="yearSelect" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-blue-100">
                  <option value="">Choose year</option>
                  ${yearOptions.map(y => `<option value="${y}" ${state.filters.year === y ? "selected" : ""}>${y}</option>`).join("")}
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Select Department</label>
                <select id="deptSelect" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-blue-100" ${state.filters.year ? "" : "disabled"}>
                  <option value="">Choose department</option>
                  ${deptOptions.map(d => `<option value="${d}" ${state.filters.dept === d ? "selected" : ""}>${d}</option>`).join("")}
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Select Division</label>
                <select id="divisionSelect" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-blue-100" ${state.filters.dept ? "" : "disabled"}>
                  <option value="">Choose division</option>
                  ${divOptions.map(v => `<option value="${v}" ${state.filters.division === v ? "selected" : ""}>${v}</option>`).join("")}
                </select>
              </div>
            </div>
          </div>

          <div class="grid xl:grid-cols-[420px_1fr] gap-6">
            <div class="glass soft-shadow rounded-[2rem] p-5 lg:p-6 border border-white/60">
              <div class="flex items-center justify-between gap-3">
                <h2 class="text-xl font-extrabold text-slate-900">Add Student</h2>
                <span class="text-xs font-semibold text-slate-500">Press Enter to move</span>
              </div>
              <div class="mt-4 space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-2">Student Name</label>
                  <input id="studentName" type="text" placeholder="Enter student name" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-blue-100" value="${escapeHTML(state.currentStudentName)}" />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-700 mb-2">Roll No</label>
                  <input id="rollNo" type="text" placeholder="Enter roll number" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none focus:ring-4 focus:ring-blue-100" value="${escapeHTML(state.currentRollNo)}" />
                </div>
                <button id="addStudentBtn" class="btn w-full rounded-2xl bg-blue-600 text-white py-3.5 font-semibold disabled:opacity-50">Add Student</button>
                <button id="downloadXlsxBtn" class="btn w-full rounded-2xl bg-emerald-600 text-white py-3.5 font-semibold">Download Monthly Excel Sheet</button>
                <button id="clearStudentsBtn" class="btn w-full rounded-2xl bg-red-600 text-white py-3.5 font-semibold">Clear All Students</button>
              </div>
              <div class="mt-5 rounded-2xl bg-slate-50 border border-slate-200 p-4 text-sm text-slate-600 leading-6">
                Attendance rule in Excel: 1, 2, 3... for present days and <span class="font-bold">.</span> for absent days. Data is prepared for 30 days.
              </div>
            </div>

            <div class="glass soft-shadow rounded-[2rem] p-4 lg:p-6 border border-white/60">
              <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4 mb-4">
                <div>
                  <h2 class="text-xl font-extrabold text-slate-900">Student Attendance Sheet</h2>
                  <p class="text-slate-500 mt-1">Mark each student present or absent for the month.</p>
                </div>
                <div class="flex flex-wrap gap-2 text-xs font-semibold text-slate-600">
                  <span class="px-3 py-2 rounded-full bg-emerald-50 border border-emerald-200">Present = green</span>
                  <span class="px-3 py-2 rounded-full bg-red-50 border border-red-200">Absent = red</span>
                </div>
              </div>
              <div class="sheet-wrap border border-slate-200 bg-white">
                <table class="min-w-full text-sm">
                  <thead>
                    <tr class="sticky-head bg-slate-900 text-white">
                      <th class="sticky-left px-4 py-4 text-left min-w-[120px]">Roll No</th>
                      <th class="sticky-left-2 px-4 py-4 text-left min-w-[200px]">Student Name</th>
                      <th class="sticky-left-3 px-4 py-4 text-left min-w-[180px]">Actions</th>
                      ${Array.from({length: DAYS_IN_MONTH}, (_, i) => `<th class="day-col px-3 py-4 text-center">${i+1}</th>`).join("")}
                    </tr>
                  </thead>
                  <tbody>
                    ${state.students.length ? state.students.map((student, idx) => `
                      <tr class="border-b border-slate-100 hover:bg-slate-50/80">
                        <td class="sticky-left bg-white px-4 py-3 font-semibold border-r border-slate-100">${escapeHTML(student.rollNo)}</td>
                        <td class="sticky-left-2 bg-white px-4 py-3 font-semibold border-r border-slate-100">${escapeHTML(student.name)}</td>
                        <td class="sticky-left-3 bg-white px-4 py-3 border-r border-slate-100">
                          <div class="flex flex-wrap gap-2">
                            <button data-action="present" data-student-id="${student.id}" class="btn rounded-xl bg-emerald-600 text-white px-3 py-2 text-xs font-bold">Present</button>
                            <button data-action="absent" data-student-id="${student.id}" class="btn rounded-xl bg-red-600 text-white px-3 py-2 text-xs font-bold">Absent</button>
                            <button data-action="reset" data-student-id="${student.id}" class="btn rounded-xl bg-slate-200 text-slate-800 px-3 py-2 text-xs font-bold">Reset</button>
                          </div>
                        </td>
                        ${Array.from({length: DAYS_IN_MONTH}, (_, day) => {
                          const val = attendanceCellValue(student, day);
                          const status = student.attendance[day];
                          const bg = status === "present" ? "bg-emerald-50 text-emerald-700" : status === "absent" ? "bg-red-50 text-red-700" : "bg-white text-slate-400";
                          return `<td class="day-col px-3 py-3 text-center font-bold border-l border-slate-100 ${bg}">${escapeHTML(val)}</td>`;
                        }).join("")}
                      </tr>
                    `).join("") : `
                      <tr>
                        <td colspan="${3 + DAYS_IN_MONTH}" class="px-6 py-16 text-center text-slate-500">
                          No students added yet. Select year, department, division, then add names and roll numbers.
                        </td>
                      </tr>
                    `}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    function bindEvents() {
      const loginGoogle = document.querySelector('[data-login="google"]');
      const loginApple = document.querySelector('[data-login="apple"]');
      if (loginGoogle) loginGoogle.onclick = () => { state.loggedIn = true; state.loginMethod = "Google"; saveState(); render(); };
      if (loginApple) loginApple.onclick = () => { state.loggedIn = true; state.loginMethod = "Apple"; saveState(); render(); };

      const logout = document.getElementById("btnLogout");
      if (logout) logout.onclick = () => { state.loggedIn = false; state.loginMethod = null; saveState(); render(); };

      const yearSelect = document.getElementById("yearSelect");
      const deptSelect = document.getElementById("deptSelect");
      const divisionSelect = document.getElementById("divisionSelect");
      if (yearSelect) yearSelect.onchange = (e) => {
        state.filters.year = e.target.value;
        state.filters.dept = "";
        state.filters.division = "";
        saveState(); render();
      };
      if (deptSelect) deptSelect.onchange = (e) => {
        state.filters.dept = e.target.value;
        state.filters.division = "";
        ensureDivisionValid();
        saveState(); render();
      };
      if (divisionSelect) divisionSelect.onchange = (e) => {
        state.filters.division = e.target.value;
        saveState(); render();
      };

      const studentName = document.getElementById("studentName");
      const rollNo = document.getElementById("rollNo");
      const addStudentBtn = document.getElementById("addStudentBtn");
      if (studentName && rollNo && addStudentBtn) {
        studentName.focus();
        studentName.oninput = (e) => { state.currentStudentName = e.target.value; };
        rollNo.oninput = (e) => { state.currentRollNo = e.target.value; };
        studentName.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); rollNo.focus(); } };
        rollNo.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); addStudent(); } };
        addStudentBtn.onclick = addStudent;
      }

      const downloadBtn = document.getElementById("downloadXlsxBtn");
      if (downloadBtn) downloadBtn.onclick = downloadExcel;

      const clearBtn = document.getElementById("clearStudentsBtn");
      if (clearBtn) clearBtn.onclick = () => {
        if (!confirm("Are you sure you want to delete all students?")) return;
        state.students = [];
        saveState();
        render();
      };

      const resetMonthBtn = document.getElementById("btnResetMonth");
      if (resetMonthBtn) resetMonthBtn.onclick = () => {
        if (!confirm("Start a new month? This will clear attendance marks but keep student list.")) return;
        state.students.forEach(s => s.attendance = Array(DAYS_IN_MONTH).fill(null));
        saveState();
        render();
      };

      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.getAttribute("data-student-id"));
          const action = btn.getAttribute("data-action");
          const student = state.students.find(s => s.id === id);
          if (!student) return;

          if (action === "present") {
            const nextDay = student.attendance.findIndex(v => !v);
            if (nextDay === -1) {
              alert("All 30 days are already filled for this student.");
              return;
            }
            student.attendance[nextDay] = "present";
          } else if (action === "absent") {
            const nextDay = student.attendance.findIndex(v => !v);
            if (nextDay === -1) {
              alert("All 30 days are already filled for this student.");
              return;
            }
            student.attendance[nextDay] = "absent";
          } else if (action === "reset") {
            student.attendance = Array(DAYS_IN_MONTH).fill(null);
          }
          saveState();
          render();
        };
      });
    }

    function addStudent() {
      const nameInput = document.getElementById("studentName");
      const rollInput = document.getElementById("rollNo");
      const name = (nameInput?.value || "").trim();
      const rollNo = (rollInput?.value || "").trim();

      if (!state.filters.year || !state.filters.dept || !state.filters.division) {
        alert("Please select Year, Department, and Division first.");
        return;
      }
      if (!name || !rollNo) {
        alert("Please enter both student name and roll number.");
        return;
      }

      state.students.push({
        id: state.nextId++,
        name,
        rollNo,
        year: state.filters.year,
        dept: state.filters.dept,
        division: state.filters.division,
        attendance: Array(DAYS_IN_MONTH).fill(null)
      });
      state.currentStudentName = "";
      state.currentRollNo = "";
      saveState();
      render();
    }

    function buildWorkbookData() {
      const header = ["Roll No", "Student Name", ...Array.from({ length: DAYS_IN_MONTH }, (_, i) => `Day ${i + 1}`)];
      const rows = state.students.map(student => {
        const row = [student.rollNo, student.name];
        for (let day = 0; day < DAYS_IN_MONTH; day++) row.push(attendanceCellValue(student, day));
        return row;
      });
      return [header, ...rows];
    }

    function downloadExcel() {
      if (!state.students.length) {
        alert("Add at least one student before downloading the Excel sheet.");
        return;
      }
      const ws = XLSX.utils.aoa_to_sheet(buildWorkbookData());
      ws["!cols"] = [
        { wch: 14 },
        { wch: 26 },
        ...Array.from({ length: DAYS_IN_MONTH }, () => ({ wch: 10 }))
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Attendance");
      const year = state.filters.year || "Year";
      const dept = state.filters.dept || "Dept";
      const div = state.filters.division || "Division";
      const fileName = `Attendance_${year}_${dept}_${div}_${state.monthLabel.replace(/\s+/g, "_")}.xlsx`;
      XLSX.writeFile(wb, fileName);
    }

    loadState();
    if (!state.students) state.students = [];
    if (!state.nextId) state.nextId = 1;
    if (!state.filters) state.filters = { year: "", dept: "", division: "" };
    if (state.filters.year && state.filters.dept && !state.filters.division) ensureDivisionValid();
    render();
  </script>
</body>
</html>
